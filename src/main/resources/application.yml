server:
  port: ${TESTBED_PORT:8080}

testbed:
  amhs:
    relay-url: ${AMHS_RELAY_URL:http://localhost:8081/relayToSocket}
    connect-timeout: ${AMHS_CONNECT_TIMEOUT:2s}
    read-timeout: ${AMHS_READ_TIMEOUT:5s}

  websocket:
    enabled: ${AMHS_WEBSOCKET_ENABLED:true}
    url: ${AMHS_WEBSOCKET_URL:ws://localhost:8081/ws}
    connect-timeout: ${AMHS_WEBSOCKET_CONNECT_TIMEOUT:5s}
    reconnect-delay: ${AMHS_WEBSOCKET_RECONNECT_DELAY:5s}

  transfer-job:
    generation-rate-per-minute: ${TRANSFER_JOB_RATE_PER_MINUTE:45}

  points:
    classpath-resource: sample-amhs-points.json
    external-file: ${AMHS_POINTS_FILE:}
